erstir. Bu yıl maddenin en küçük yapı taşı olan atomdan başlayarak periyodik tabloya, oradan kimyasal bağlara ve moleküller arası kuvvetlere uzanan bir yolculuğa çıkacaksınız.",learnItems:["Kimyanın günlük hayattaki yerini ve önemini kavrayacaksınız. Sabun, ilaç, gıda katkı maddeleri gibi etrafınızdaki her şeyin kimyayla ilişkisini göreceksiniz.","Atom teorilerinin tarihsel gelişimini (Dalton, Thomson, Rutherford, Bohr) öğrenecek ve modern atom modeline geçişi anlayacaksınız.","Elektron dizilimlerini yazabilecek, orbitalleri tanıyacak ve bir elementin periyodik tablodaki yerini proton sayısından bulabileceksiniz.","Periyodik özellikleri (atom yarıçapı, iyonlaşma enerjisi, elektronegatiflik) karşılaştırabilecek ve eğilimleri yorumlayabileceksiniz.","Metalik, iyonik ve kovalent bağların nasıl oluştuğunu, Lewis nokta yapılarını çizebilecek ve moleküllerin polar/apolar olduğunu belirleyebileceksiniz.","Moleküller arası etkileşimleri (Van der Waals, dipol-dipol, hidrojen bağı) tanıyacak ve bunların maddenin kaynama/erime noktasına etkisini anlayacaksınız.","Nanoparçacıklar ve yeşil kimya gibi modern kavramlarla tanışarak sürdürülebilir bir gelecek için kimyanın rolünü keşfedeceksiniz."],formulas:[{id:"f9-1",name:"Atom Numarası",formula:"Z = proton sayısı",description:"Bir atomdaki proton sayısı, o elementin atom numarasını verir ve periyodik tablodaki yerini belirler.",category:"Atom"},{id:"f9-2",name:"Kütle Numarası",formula:"A = Z + N",description:"Kütle numarası, proton sayısı (Z) ile nötron sayısının (N) toplamıdır. Çekirdekteki toplam nükleonu gösterir.",category:"Atom"},{id:"f9-3",name:"Nötron Sayısı",formula:"N = A − Z",description:"Nötron sayısı, kütle numarasından proton sayısı çıkarılarak bulunur.",category:"Atom"},{id:"f9-4",name:"İyon Yükü",formula:"Yük = proton − elektron",description:"Bir atomun kaybettiği veya kazandığı elektron sayısına göre yük kazanır. Pozitif yük: elektron kaybı, negatif yük: elektron kazanımı.",category:"Atom"},{id:"f9-5",name:"Değerlik Elektron Sayısı",formula:"Son enerji düzeyindeki e⁻",description:"Bir atomun en dış katmanındaki elektron sayısıdır. Kimyasal bağ kurma kapasitesini belirler.",category:"Periyodik Tablo"},{id:"f9-6",name:"Oktet Kuralı",formula:"Son katmanda 8 e⁻",description:"Atomlar, en dış katmanlarında 8 elektron bulundurarak (soy gaz kararlılığı) kararlı hale gelmeye çalışır.",category:"Bağlar"},{id:"f9-7",name:"Elektronegatiflik Farkı",formula:"ΔEN = |EN₁ − EN₂|",description:"İki atom arasındaki elektronegatiflik farkı bağ türünü belirler. ΔEN > 1.7 ise iyonik, < 1.7 ise kovalent bağ oluşur.",category:"Bağlar"},{id:"f9-8",name:"Periyot Numarası",formula:"Periyot = katman sayısı",description:"Bir elementin periyot numarası, atomdaki enerji düzeyi (katman) sayısına eşittir.",category:"Periyodik Tablo"}],units:[{id:"9-u1",title:"1. Ünite: Etkileşim",subUnits:[{id:"9-u1-s1",title:"1.1 Kimya Hayattır",topics:[{id:"9-t1",title:"Günlük Hayatta Kimya",quizQuestions:[{q:"Aşağıdakilerden hangisi kimyanın günlük hayattaki uygulamalarından biri değildir?",options:["İlaç üretimi","Gıda muhafazası","Gezegen yörüngesi hesaplama","Temizlik maddeleri üretimi"],correct:2},{q:"Sabun üretiminde kullanılan kimyasal süreç hangisidir?",options:["Sabunlaşma (saponifikasyon)","Elektroliz","Nükleer fisyon","Fotosentez"],correct:0},{q:"Gıdaların bozulmasını yavaşlatmak için kullanılan yöntem hangisidir?",options:["Antioksidan ekleme","Asit ekleme","Radyoaktif ışınlama","Hepsi"],correct:3},{q:"Hangisi bir kimyasal değişimdir?",options:["Buz erimesi","Kâğıdın yanması","Şekerin suda çözünmesi","Cam kırılması"],correct:1},{q:"Deterjanlar kirleri nasıl temizler?",options:["Yüzey gerilimini azaltarak","Sıcaklığı artırarak","Kirli yüzeyi aşındırarak","Suyu buharlaştırarak"],correct:0}],tfQuestions:[{statement:"Kimya sadece laboratuvarda çalışılan bir bilim dalıdır.",answer:!1},{statement:"Yemek pişirme sırasında kimyasal tepkimeler gerçekleşir.",answer:!0},{statement:"İlaçların vücuttaki etkisi kimyasal reak nur.",category:"Stokiyometri"},{id:"f10-3",name:"İdeal Gaz Denklemi",formula:"PV = nRT",description:"P: basınç (atm), V: hacim (L), n: mol, R: 0.082 L·atm/mol·K, T: sıcaklık (K). İdeal gazların davranışını tanımlar.",category:"Gazlar"},{id:"f10-4",name:"Boyle Yasası",formula:"P₁V₁ = P₂V₂",description:"Sabit sıcaklıkta bir gazın basıncı artarsa hacmi azalır. Basınç × Hacim = Sabit.",category:"Gazlar"},{id:"f10-5",name:"Charles Yasası",formula:"V₁/T₁ = V₂/T₂",description:"Sabit basınçta bir gazın sıcaklığı artarsa hacmi de artar. Hacim/Sıcaklık = Sabit.",category:"Gazlar"},{id:"f10-6",name:"Gay-Lussac Yasası",formula:"P₁/T₁ = P₂/T₂",description:"Sabit hacimde bir gazın sıcaklığı artarsa basıncı da artar. Basınç/Sıcaklık = Sabit.",category:"Gazlar"},{id:"f10-7",name:"Molarite",formula:"CM = n / V",description:"CM: molar derişim (mol/L), n: çözünen mol sayısı, V: çözelti hacmi (L). Birim hacimde çözünen mol sayısıdır.",category:"Çözeltiler"},{id:"f10-8",name:"Kütlece Yüzde",formula:"% = (mçözünen/mçözelti)×100",description:"100 gram çözeltideki çözünen madde gram miktarıdır.",category:"Çözeltiler"},{id:"f10-9",name:"Graham Yasası",formula:"r₁/r₂ = √(M₂/M₁)",description:"Gazların yayılma hızı mol kütlesinin kareköküyle ters orantılıdır. Hafif gaz daha hızlı yayılır.",category:"Gazlar"},{id:"f10-10",name:"Kaynama N. Yükselmesi",formula:"ΔTb = Kb × m × i",description:"Çözeltinin kaynama noktası saf çözücüye göre yükselir. Kb: ebülyoskopik sabit, m: molalite, i: van't Hoff faktörü.",category:"Çözeltiler"},{id:"f10-11",name:"Donma N. Düşmesi",formula:"ΔTf = Kf × m × i",description:"Çözeltinin donma noktası saf çözücüye göre düşer. Kf: kriyoskopik sabit.",category:"Çözeltiler"},{id:"f10-12",name:"NKS'de Hacim",formula:"V = n × 22.4 L",description:"Normal koşullarda (0°C, 1 atm) 1 mol ideal gazın hacmi 22.4 litredir.",category:"Gazlar"}],units:[{id:"10-u1",title:"1. Ünite: Kimyasal Tepkimeler",subUnits:[{id:"10-u1-s1",title:"1.1 Tepkime Çeşitleri",topics:[{id:"10-t1",title:"Te
